<!DOCTYPE html>
<html>
<head>
    <title>Smart Crowd Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-5xl p-8 bg-white shadow-2xl rounded-2xl">

    <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
        Smart Crowd & Safety Monitoring System
    </h1>

    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div>
            <label class="block font-semibold mb-1">Select Location</label>
            <select name="location" required
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
                <option value="Mall - Ground Floor">Mall - Ground Floor</option>
                <option value="Mall - Food Court">Mall - Food Court</option>
                <option value="Stadium - Gate A">Stadium - Gate A</option>
                <option value="Metro - Platform 1">Metro - Platform 1</option>
            </select>
        </div>

        <div>
            <label class="block font-semibold mb-1">Entries</label>
            <input type="number" name="entries" required
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block font-semibold mb-1">Exits</label>
            <input type="number" name="exits" required
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block font-semibold mb-1">Capacity</label>
            <input type="number" name="capacity" required
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block font-semibold mb-1">Exit Doors</label>
            <input type="number" name="exit_doors" required
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="col-span-full text-center">
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-semibold transition duration-300">
                Predict Crowd
            </button>
        </div>

    </form>

    {% if result %}

    <!-- Result Cards -->
    <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="p-6 bg-blue-100 rounded-xl shadow">
            <h2 class="text-xl font-bold text-blue-700">{{ result }}</h2>
            <p class="text-sm text-gray-600 mt-1">{{ location }}</p>
        </div>

        <div class="p-6 bg-gray-100 rounded-xl shadow">
            <h3 class="font-semibold">Entry Waiting Time</h3>
            <p class="text-lg">{{ waiting_time }}</p>
        </div>

        <div class="p-6 bg-yellow-100 rounded-xl shadow">
            <h3 class="font-semibold">Alert</h3>
            <p>{{ alert }}</p>
        </div>

        <div class="p-6 bg-green-100 rounded-xl shadow">
            <h3 class="font-semibold">Density</h3>
            <p class="text-lg">{{ density_percent }} %</p>
        </div>

        <div class="p-6 bg-purple-100 rounded-xl shadow">
            <h3 class="font-semibold">Risk Score</h3>
            <p class="text-lg">{{ risk_score }}</p>
        </div>

        <div class="p-6 bg-red-100 rounded-xl shadow">
            <h3 class="font-semibold">Evacuation Time</h3>
            <p class="text-lg">{{ evac_time }} minutes</p>
        </div>

    </div>

    <!-- Chart -->
    <div class="mt-12">
        <h3 class="text-lg font-semibold text-center mb-4">
            Crowd Density Visualization
        </h3>
        <canvas id="densityChart"></canvas>
    </div>

    <!-- Speak Button -->
    <div class="text-center mt-6">
        <button onclick="speakResult()"
            class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg transition">
            🔊 Speak Result
        </button>
    </div>

    {% endif %}

</div>

<script>
function speakResult() {
    let text = "{{ result }}. Waiting time {{ waiting_time }}. {{ alert }}";
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}
</script>

<script>
{% if density_percent %}
const ctx = document.getElementById('densityChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Density'],
        datasets: [{
            label: 'Density %',
            data: [{{ density_percent }}],
            backgroundColor: 'rgba(59, 130, 246, 0.7)'
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true,
                max: 100
            }
        }
    }
});
{% endif %}
</script>

</body>
</html>
