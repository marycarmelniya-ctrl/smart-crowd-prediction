<!DOCTYPE html>
<html>
<head>
    <title>Smart Crowd Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Smart Crowd Prediction System</h1>

    <form method="POST" class="form-box">

        <!-- Location INSIDE form -->
        <label>Select Location</label>
        <select name="location" required>
            <option value="Mall - Ground Floor">Mall - Ground Floor</option>
            <option value="Mall - Food Court">Mall - Food Court</option>
            <option value="Stadium - Gate A">Stadium - Gate A</option>
            <option value="Metro - Platform 1">Metro - Platform 1</option>
        </select>

        <label>Entries</label>
        <input type="number" name="entries" required>

        <label>Exits</label>
        <input type="number" name="exits" required>

        <label>Capacity</label>
        <input type="number" name="capacity" required>

        <label>Number of Exit Doors</label>
        <input type="number" name="exit_doors" required>

        <button type="submit">Predict Crowd</button>
    </form>

    {% if result %}
    <div class="dashboard">

        <div class="card {{ result_class }}">
            <h2>{{ result }}</h2>
        </div>

        <div class="card">
            <h3>Waiting Time</h3>
            <p>{{ waiting_time }}</p>
        </div>

        <div class="card">
            <h3>Alert</h3>
            <p>{{ alert }}</p>
        </div>

        <div class="card">
            <h3>Density</h3>
            <p>{{ density_percent }} %</p>
        </div>

        <div class="card">
            <h3>Risk Score</h3>
            <p>{{ risk_score }}</p>
        </div>

        <div class="card">
            <h3>Evacuation Time</h3>
            <p>{{ evac_time }} minutes</p>
        </div>

        <button onclick="speakResult()">🔊 Speak Result</button>

    </div>
    {% endif %}

</div>

<script>
function speakResult() {
    let text = "{{ result }}. Waiting time {{ waiting_time }}. {{ alert }}";
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
